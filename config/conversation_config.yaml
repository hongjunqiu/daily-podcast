# 每日科技播客 — 对话配置（Phase 2）
# 与 show_identity.yaml 保持一致

conversation_style:
  - "engaging"
  - "informative"
  - "humorous"
  - "conversational"

roles_person1: "芊悦 — 主讲人，阳光大方、有主见，喜欢深挖新闻背后的逻辑"
roles_person2: "萌萌 — 搭档，活泼好奇、敢于挑战和质疑，擅长用生活化类比"

dialogue_structure:
  - "开场寒暄与节目介绍"
  - "今日头条新闻"
  - "深度解读 2-3 条重点新闻"
  - "快讯速览"
  - "总结与结尾"

podcast_name: "科技早知道"
podcast_tagline: "每天 5 分钟，掌握科技圈大小事"
output_language: "Chinese"

engagement_techniques:
  - "rhetorical questions"
  - "humor"
  - "analogies"
  - "pop culture references"
  - "listener interaction prompts"

creativity: 0.8

text_to_speech:
  default_tts_model: "qwen3-tts-instruct-flash"
  output_directories:
    transcripts: "./data/transcripts"
    audio: "./data/audio"
  voices:
    芊悦:
      voice: "Cherry"
      instructions: "自然大方，语速稍快，像朋友聊天，阳光自然"
    萌萌:
      voice: "Bunny"
      instructions: "活泼可爱，语速稍快，充满好奇心，偶尔惊讶"
  audio_format: "mp3"
  temp_audio_dir: "data/audio/tmp/"
  ending_message: "感谢收听，我们明天见！"
